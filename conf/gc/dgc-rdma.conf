# dgc-rdma.conf — DGC with RDMA transport

GC_MODE="dgc"
GC_NAME="dgc-rdma"
DGC_TRANSPORT="rdma"

GC_FLAGS="-XX:+UseShenandoahGC"
SNIC_FLAGS="-XX:+UnlockExperimentalVMOptions -XX:+UnlockDiagnosticVMOptions -XX:-SnicGCShareMemEnabled -XX:-ShenandoahPacing"

# Host JVM flags
# SnicFallbackCCMT=8: use all 8 host cores for fallback marking
# SnicDGCCCMT=4: host-side DGC workers during remote marking
HOST_FLAGS="-XX:+SnicGCHost -XX:HeapBaseMinAddress=0x500000000 -XX:-ShenandoahVerify -XX:+SnicConcCopyRegion -XX:+SnicGCRDMAPrefetchEnabled -XX:SnicGCEstimatedRDMACopyTime=60 -XX:SnicFallbackCCMT=8 -XX:SnicDGCCCMT=4"
HOST_SATB_FLUSHES=5

# Coordinator's CP-SAT marking-time model is seeded by the JDK's
# SnicCoorCCMTArgs default ("0:0:500;4:0:500") and refined per-cycle via
# EWMA when +SnicCoorAdaptiveCCMT is on (default below). No static seed
# override is needed for AE.
# fig7's CACHE_SIZES sweep edits COOR_CCMT_ARGS in this file at runtime
# and restores on exit — see osdi26-scripts/fig7/fig7-run.sh.
# COOR_CCMT_ARGS="0:0:550;4:0:475"

# Client JVM flags
CLIENT_FLAGS="-XX:+SnicGCClient -XX:+SnicConcCopyRegion -XX:-UseDynamicNumberOfGCThreads -XX:SnicGCEstimatedRDMACopyTime=60"

# RDMA-specific
RDMA_BASE_PORT=2340
COOR_RDMA_PORT=9999

# Coordinator
# +SnicCoorAdaptiveCCMT enables EWMA-learned coor_ccmt_b values + the
# always-prefer-DGC CP-SAT bias. The static COOR_CCMT_ARGS above is
# only used as a seed before EWMA accumulates samples. To pin the
# coordinator to the static path, append "-XX:-SnicCoorAdaptiveCCMT"
# to COOR_FLAGS (last -XX: wins).
COORDINATOR=true
COOR_FLAGS="-XX:+SnicGCCoorHeuristic -XX:+SnicGCCoordinator -XX:SnicCoorFrozenDGCUpperBound=50 -XX:+DGCNoPenalty -XX:+SnicCoorAdaptiveCCMT"

NUMA_NODE=0                 # DGC client uses cpu_dgc_client() → even CPUs → NUMA node 0
