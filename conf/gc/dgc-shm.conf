# dgc-shm.conf — DGC with shared memory transport

GC_MODE="dgc"
GC_NAME="dgc-shm"
DGC_TRANSPORT="shm"         # shared memory

GC_FLAGS="-XX:+UseShenandoahGC"
SNIC_FLAGS="-XX:+UnlockExperimentalVMOptions -XX:+UnlockDiagnosticVMOptions -XX:+SnicGCShareMemEnabled -XX:-ShenandoahPacing"

# Host JVM flags
# SnicFallbackCCMT=4: fallback uses all 8 physical cores (old scripts hardcoded 8)
# SnicDGCCCMT=4: DGC host-side workers during remote marking
# SnicFallbackCCMT=4: use all 8 host cores for fallback marking (avoids degens)
# SnicDGCCCMT=4: host-side DGC workers during remote marking
HOST_FLAGS="-XX:+SnicGCHost -XX:HeapBaseMinAddress=0x500000000 -XX:-ShenandoahVerify -XX:SnicFallbackCCMT=4 -XX:SnicDGCCCMT=4"
HOST_SATB_FLUSHES=5

# Coordinator's CP-SAT marking-time model is seeded by the JDK's
# SnicCoorCCMTArgs default ("0:0:500;4:0:500") and refined per-cycle via
# EWMA when +SnicCoorAdaptiveCCMT is on (default below). No static seed
# override is needed for AE; if you want to pin a hand-tuned seed,
# uncomment and set COOR_CCMT_ARGS — runner-dgc.sh forwards it to the
# host JVM as -XX:SnicCoorCCMTArgs= when set.
# COOR_CCMT_ARGS="0:0:446;4:0:394"

# Client JVM flags
CLIENT_FLAGS="-XX:+SnicGCClient -XX:+SnicConcCopyRegion -XX:-UseDynamicNumberOfGCThreads"

# Coordinator flags
# +SnicCoorAdaptiveCCMT enables EWMA-learned coor_ccmt_b values + the
# always-prefer-DGC CP-SAT bias. The static COOR_CCMT_ARGS above is
# only used as a seed before EWMA accumulates samples. To pin the
# coordinator to the static path, append "-XX:-SnicCoorAdaptiveCCMT"
# to COOR_FLAGS (last -XX: wins).
COORDINATOR=true
COOR_FLAGS="-XX:+SnicGCCoorHeuristic -XX:+SnicGCCoordinator -XX:+SnicCoorAdaptiveCCMT"
COOR_FROZEN_UPPER=80

# Shared memory paths (SHM_PREFIX injected at runtime for isolation)
# Actual paths: /dev/shm/${SHM_PREFIX}_share_heap_${host_id}, etc.

NUMA_NODE=0                 # DGC processes on NUMA node 0
