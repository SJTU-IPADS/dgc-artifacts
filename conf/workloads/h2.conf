# h2.conf — H2 TPC-C throttle benchmark (DaCapo)

BENCH_NAME="h2"
BENCH_RUNNER="dacapo"       # → lib/workload-dacapo.sh

# JAR paths (all GC variants use the same JAR for H2)
BENCH_JAR_baseline="${DACAPO_DIR}/h2-throttle-chasing-new.jar"
BENCH_JAR_dgc="${DACAPO_DIR}/h2-throttle-chasing-new.jar"

# Heap: min_heap × multiplier
MIN_HEAP=677                # MB (minimum heap for Shenandoah)
HEAP_MULTIPLIER="2.0"       # actual heap = 677 × 2 = 1354 MB

# DaCapo parameters
ITERATIONS=5                # -n 5
TERMINAL_NUM=8              # -t 8 (both baseline and dgc)
DACAPO_SIZE=""              # no -s flag for h2
DACAPO_EXTRA_FLAGS="--no-validation --latency-csv"

# Throttle rates (x-axis of RT curve)
THROTTLES="200 300 400 500 600 700 800 1000"

# GC thread / core overrides (per GC mode)
# baseline: 12 cores, 12 threads (same total as dgc: 8+4=12)
CCMT_baseline=12
PCORE_baseline=12
# dgc: 8 host cores + 4 client cores
CCMT_dgc=8
PCORE_dgc=8
CLIENT_CCMT_dgc=8

# Host-side marking thread counts for fallback / DGC modes.
# SnicFallbackCCMT=8 → host uses all 8 cores for fallback marking (mutator
# is paused during the STW phases, so no contention). Old default =4 halved
# fallback throughput and caused the GC trigger to fall behind under 2-host
# pressure, cascading into "Outside of Cycle" + "Update Refs" degens.
# SnicDGCCCMT=4 → host worker threads participating in DGC roots/SATB only.
SNIC_FALLBACK_CCMT_dgc=8
SNIC_DGC_CCMT_dgc=4
# Coordinator frozen-DGC upper bound — how many cycles to stay in fallback
# mode after a DGC "penalty". Default 80 (dgc-shm.conf), dacapo path hardcoded
# 50 previously; 20 keeps recovery snappy so degen doesn't permanently lock
# the coordinator into fallback.
COOR_FROZEN_UPPER_dgc=20

# Coordinator's CP-SAT marking-time model is now seeded by the JDK's
# SnicCoorCCMTArgs default ("0:0:500;4:0:500") and refined per-cycle via
# EWMA when +SnicCoorAdaptiveCCMT is on (default in dgc-shm.conf /
# dgc-rdma.conf). No per-workload static seed needed. To pin a hand-tuned
# seed for SHM or RDMA, uncomment the matching line below — workload-
# dacapo.sh forwards it as -XX:SnicCoorCCMTArgs= when set.
# SNIC_COOR_CCMT_ARGS_shm="0:0:187;4:0:187"
# SNIC_COOR_CCMT_ARGS_rdma="0:0:182;4:0:347"
