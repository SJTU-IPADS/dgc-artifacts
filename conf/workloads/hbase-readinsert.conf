# hbase-readinsert.conf — HBase with YCSB read-insert-half (50% read, 50% insert)

BENCH_NAME="hbase"
BENCH_RUNNER="hbase"

YCSB_WORKLOAD="read_insert_half_workload"
HEAP=3072
HEAP_LABEL="2.0"
HOST_NUM=2
YCSB_THREADS=60
YCSB_WARMUP_SEC=30
YCSB_RUN_SEC=60

# Injection rates — same as workloada
IR_RATES="4500 9000 13500 18000 22500 27000 31500 36000 40500 45000"

# GC thread / core overrides
CCMT_baseline=10
PCORE_baseline=10
CCMT_dgc=4
PCORE_dgc=8
CLIENT_CCMT_dgc=4
