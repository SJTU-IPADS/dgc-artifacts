# hbase-workloada.conf — HBase with YCSB workload-A (50% read, 50% update)

BENCH_NAME="hbase"
BENCH_RUNNER="hbase"        # → lib/workload-hbase.sh

YCSB_WORKLOAD="workloada_2host"
HEAP=3072                   # MB (fixed, not using multiplier)
HEAP_LABEL="2.0"            # label for result dirs / CSV
HOST_NUM=2                  # 2 region servers
YCSB_THREADS=60             # YCSB client threads
YCSB_WARMUP_SEC=30
YCSB_RUN_SEC=60

# Injection rates (x-axis of RT curve)
IR_RATES="4500 9000 13500 18000 22500 27000 31500 36000 40500 45000"

# GC thread / core overrides
CCMT_baseline=10
PCORE_baseline=10
CCMT_dgc=4
PCORE_dgc=8
CLIENT_CCMT_dgc=4
