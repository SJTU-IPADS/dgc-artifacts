# specjbb-hbir.conf — SPECjbb2015 HBIR_RT mode (ramp-up to find critical-jOPS)
# WARNING: This mode takes much longer than PRESET (30+ minutes per run)

BENCH_NAME="specjbb"
BENCH_RUNNER="specjbb"

SPECJBB_MODE="HBIR_RT"
SPECJBB_GROUPS=2
SPECJBB_CONTROLLER_PORT=24000
SPECJBB_MULTI=true          # MULTI mode (single controller + per-group TxInjector+Backend)
                            # avoids IC port-24000 conflict that COMPOSITE 2-group hits
SPECJBB_TIMEOUT_SEC=10800   # 3-hour watchdog (HBIR_RT auto-ramps + builds RT curve;
                            # default formula gives only 360s; HBIR_RT may need long tail to converge).
HEAP=4096
TXI_HEAP=8192

BENCH_JAR_default="${SPECJBB_DIR}/specjbb2015.jar"

CCMT_baseline=8
PCORE_baseline=10
CCMT_dgc=4
PCORE_dgc=8
CLIENT_CORES_dgc=4
