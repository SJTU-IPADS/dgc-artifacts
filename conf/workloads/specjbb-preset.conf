# specjbb-preset.conf — SPECjbb2015 PRESET mode (fixed IR, fixed duration)

BENCH_NAME="specjbb"
BENCH_RUNNER="specjbb"      # → lib/workload-specjbb.sh

SPECJBB_MODE="PRESET"
SPECJBB_IR=6819             # injection rate per backend
SPECJBB_DURATION=60000      # ms
SPECJBB_GROUPS=2            # number of backend groups
SPECJBB_CONTROLLER_PORT=24000
SPECJBB_MULTI=true          # Use MULTI mode (TxInjector+Backend separate) for all GCs
HEAP=4096                   # MB per backend
TXI_HEAP=8192               # MB for TxInjector

# JAR: baseline and fig1/fig5 use different JARs
BENCH_JAR_default="${SPECJBB_DIR}/specjbb2015.jar"
BENCH_JAR_latency="${SPECJBB_DIR}/specjbb-output-latency-with-start.jar"

# GC thread / core overrides
CCMT_baseline=8
PCORE_baseline=10           # baseline: 10 cores per JVM (fair comparison)
CCMT_dgc=4                  # DGC: 4 concurrent marking threads on client
PCORE_dgc=8                 # DGC: 8 cores per backend
CLIENT_CORES_dgc=4          # DGC: 4 cores per client
