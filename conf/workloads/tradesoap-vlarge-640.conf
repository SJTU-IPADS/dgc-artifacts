# tradesoap-vlarge-640.conf
# Stock DaCapo vlarge (s=13, 8192 sessions, ds03 常用).
# minheap=640 MB, perf heap = 2x = 1280 MB.
# Run under shenandoah, dgc-rdma, dgc-shm (one GC per `./run.sh` invocation).
#
# Validated 2026-04-24 on ds00 HOST_COUNT=2 at throttles 1000/2000/3000/4000/5000:
# shen/shm 3-PASS; RDMA partial. See FIXES_DS00.md for the 5 bandaids needed
# on ds00 to make HOST_COUNT=2 work (jar cnf, EAR, operations.csv, port-offset).

BENCH_NAME="tradesoap"
BENCH_RUNNER="dacapo"

BENCH_JAR_baseline="${DACAPO_DIR}/dacapo-tradesoap-throttle.jar"
BENCH_JAR_dgc="${DACAPO_DIR}/dacapo-tradesoap-throttle.jar"

MIN_HEAP=640
HEAP_MULTIPLIER="2.0"    # Xmx = 1280m

# HOST_COUNT=2 works after the (hid+1)*100 port-offset patch in
# lib/workload-dacapo.sh (FIXES_DS00.md 修 4).
HOST_COUNT=2
ITERATIONS=5
TERMINAL_NUM=4
DACAPO_SIZE="vlarge"

DACAPO_EXTRA_FLAGS="--no-validation --latency-csv -f 10"   # vlarge seed is small, no need for -f 30
DACAPO_THROTTLE_FLAG="-Ddacapo.daytrader.issue.rate"
DACAPO_JVM_EXTRA_FLAGS="-Ddacapo.daytrader.logIterSessions=10"

THROTTLES="1000 1500 2000 2500 3000"

CCMT_baseline=10
PCORE_baseline=10
CCMT_dgc=8
PCORE_dgc=8
CLIENT_CCMT_dgc=4

SNIC_FALLBACK_CCMT_dgc=8
SNIC_DGC_CCMT_dgc=4
COOR_FROZEN_UPPER_dgc=20

# CP-SAT marking-time seed inherits from the JDK default
# (SnicCoorCCMTArgs="0:0:500;4:0:500") and is refined by EWMA in adaptive
# mode (default). Uncomment to pin a hand-tuned seed.
# SNIC_COOR_CCMT_ARGS_shm="0:0:168;8:0:125"
# SNIC_COOR_CCMT_ARGS_rdma="0:0:176;8:0:258"

SNIC_RDMA_BATCH_FETCHKLASS_dgc=true
